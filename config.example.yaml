# config.example.yaml
input_dir: ./videos
output_dir: ./out

roi:
  # fixed | auto_per_video
  mode: auto_per_video
  rect_landscape: [520, 360, 260, 220]  # x,y,w,h
  rect_portrait: [160, 260, 360, 360]   # x,y,w,h
  # Optional normalized fallback rect:
  # rect_norm: [0.40, 0.45, 0.20, 0.30]
  # Optional per-video manual override:
  # overrides:
  #   "11": [200, 450, 340, 340]
  #   "40": [130, 360, 320, 320]
  auto:
    sample_sec: 2.0
    sample_frames: 15
    orb_nfeatures: 3500
    ratio_test: 0.75
    min_matches: 20
    min_inliers: 8
    ransac_thresh: 5.0
    refine: true
    search_ratio: 0.18
    search_steps: 7
    scales: [0.9, 1.0, 1.1]
    max_refs: 10
    min_ref_score: 0.45

segment_detection:
  method: ssim_ref
  coarse_fps: 6.0
  resize_w: 320
  smooth_win: 7
  ssim_ref_n_ref: 5
  # peak: fixed-length segment centered at peak
  # run: use threshold run boundary + pad, better for full crack evolution coverage
  segment_strategy: peak   # peak | run
  run_pre_pad_sec: 1.0
  run_post_pad_sec: 1.5
  run_max_len_sec: 20.0
  threshold:
    mode: quantile
    q: 0.98
    mad_k: 6.0
  topk: 3
  fill_to_topk: true
  segment_len_sec: 8.0
  merge_gap_sec: 0.5

frame_extraction:
  fine_fps: 10.0
  image_ext: jpg
  jpg_quality_q: 2
  keep_full_frames: false
  crop_output: true
  crop_resize: [640, 640]      # null to keep original ROI size
  crop_resize_mode: letterbox  # letterbox | stretch
  crop_resize_pad_value: 114   # padding color for letterbox

report:
  enable_html: true
  contact_sheet_fps: 1.0
  tile: [4, 3]

runtime:
  workers: 1
  fail_fast: false
  log_level: INFO
