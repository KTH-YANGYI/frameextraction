input_dir: C:/Users/18046/Desktop/master/masterthesis/rawdata/rawdata
output_dir: ./out_rawdata_fullcrack

roi:
  mode: auto_per_video
  rect_landscape: [520, 360, 260, 220]
  rect_portrait: [160, 260, 360, 360]
  overrides:
    "11": [100, 500, 340, 340]
  auto:
    sample_sec: 2.0
    sample_frames: 15
    orb_nfeatures: 3500
    ratio_test: 0.75
    min_matches: 20
    min_inliers: 8
    ransac_thresh: 5.0
    refine: true
    search_ratio: 0.18
    search_steps: 7
    scales: [0.9, 1.0, 1.1]

segment_detection:
  method: ssim_ref
  coarse_fps: 8.0
  resize_w: 320
  smooth_win: 5
  ssim_ref_n_ref: 5
  segment_strategy: run
  run_pre_pad_sec: 1.2
  run_post_pad_sec: 2.0
  run_max_len_sec: 18.0
  threshold:
    mode: quantile
    q: 0.96
    mad_k: 6.0
  topk: 3
  fill_to_topk: true
  segment_len_sec: 10.0
  merge_gap_sec: 0.8

frame_extraction:
  fine_fps: 15.0
  image_ext: jpg
  jpg_quality_q: 2
  keep_full_frames: false
  crop_output: true

report:
  enable_html: true
  contact_sheet_fps: 1.0
  tile: [4, 3]

runtime:
  workers: 1
  fail_fast: false
  log_level: INFO
